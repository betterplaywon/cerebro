<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="cerebro">
  <!-- cerebro 마크: 어두운 배경 위 발광 코어 + 위성 노드(중심-가지 마인드맵 모티프) -->
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bdfcff" />
      <stop offset="55%" stop-color="#7cf6ff" />
      <stop offset="100%" stop-color="#2bb5d6" />
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.1" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="7" fill="#05070f" />
  <g stroke="#7cf6ff" stroke-width="1.2" stroke-opacity="0.55" stroke-linecap="round">
    <line x1="16" y1="16" x2="24" y2="8" />
    <line x1="16" y1="16" x2="7" y2="11" />
    <line x1="16" y1="16" x2="22" y2="24" />
  </g>
  <g fill="#7cf6ff">
    <circle cx="24" cy="8" r="2.1" />
    <circle cx="7" cy="11" r="2.1" />
    <circle cx="22" cy="24" r="2.1" />
  </g>
  <circle cx="16" cy="16" r="4.6" fill="url(#core)" filter="url(#glow)" />
</svg>
